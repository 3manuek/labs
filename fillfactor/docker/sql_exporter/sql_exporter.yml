# This example contains two collectors, one to collect server metrics, and a second to collect database level metrics.
# All metrics are prefixed according to which collector they originate from "pg_db_" or "pg_server_".
# Many of these have been copied from https://github.com/prometheus-community/postgres_exporter
global:
  scrape_timeout: 30s
  min_interval: 15s
jobs:
  - job_name: database
    collectors: [database]
    static_configs:
      - targets:
          ori13: 'postgresql://postgres:postgres@postgres13:5432/ori13?sslmode=disable'
          onlyff13: 'postgresql://postgres:postgres@postgres13:5432/onlyff13?sslmode=disable'
          ori18: 'postgresql://postgres:postgres@postgres18:5432/ori18?sslmode=disable'
          onlyff18: 'postgresql://postgres:postgres@postgres18:5432/onlyff18?sslmode=disable'
          ori17: 'postgresql://postgres:postgres@postgres17:5432/ori17?sslmode=disable'
          onlyff17: 'postgresql://postgres:postgres@postgres17:5432/onlyff17?sslmode=disable'
          # by_hash: 'postgresql://postgres:postgres@postgres13:5432/by_hash?sslmode=disable'
  # - job_name: server
  #   collectors: [server]
  #   static_configs:
  #     - targets:
  #         server: 'postgresql://postgres@/var/run/postgresql?sslmode=disable'

collector_files: ['postgres_database.yml']